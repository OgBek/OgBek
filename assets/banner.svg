<path d="M680 0V340"/>
<path d="M820 0V340"/>
<path d="M960 0V340"/>
<path d="M1100 0V340"/>

</g>

<!-- Blue Accent -->

<rect x="40" y="40" width="7" height="260" rx="4" fill="url(#blue)"/>

