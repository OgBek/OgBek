<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F7FA"/>
      <stop offset="50%" stop-color="#EAF2F8"/>
      <stop offset="100%" stop-color="#F1EBF9"/>
    </linearGradient>

    <radialGradient id="orb-mist" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb-lavender" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb-mint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <style>
      /* Slow, meditative floating animations */
      @keyframes drift-calm {
        0%, 100% { transform: translate(0px, 0px) scale(1); }
        50% { transform: translate(30px, -15px) scale(1.05); }
      }
      @keyframes drift-reverse {
        0%, 100% { transform: translate(0px, 0px) scale(1.05); }
        50% { transform: translate(-20px, 20px) scale(0.95); }
      }
      .orb-1 { animation: drift-calm 14s ease-in-out infinite; }
      .orb-2 { animation: drift-reverse 18s ease-in-out infinite 1s; }
      .orb-3 { animation: drift-calm 16s ease-in-out infinite reverse; }
    </style>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg-sky)"/>

  <g style="mix-blend-mode: multiply;">
    <circle class="orb-1" cx="1120" cy="90" r="200" fill="url(#orb-mist)"/>
    <circle class="orb-2" cx="950" cy="250" r="240" fill="url(#orb-lavender)"/>
    <circle class="orb-3" cx="720" cy="110" r="160" fill="url(#orb-mint)"/>
  </g>

  <text x="80" y="115" font-size="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-weight="800" fill="#1E293B" letter-spacing="-1px">
    Bekam Beyene
  </text>

  <text x="82" y="158" font-size="20" font-family="'Fira Code', Menlo, Monaco, Consolas, monospace" font-weight="600" fill="#2563EB" letter-spacing="-0.5px">
    Backend-Heavy Full Stack Developer
  </text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="18" fill="#475569" font-weight="400">
    <text x="82" y="212">Building production-ready backend architectures, secure payment integrations,</text>
    <text x="82" y="242">high-reliability API design, and intuitive open-source developer tooling.</text>
  </g>

  <text x="82" y="295" font-size="13" font-family="'Fira Code', Menlo, Monaco, monospace" font-weight="600" fill="#6B21A8" letter-spacing="1.5px">
    LARAVEL • PHP • SPRING BOOT • REACT • REDIS • DOCKER • POSTGRESQL
  </text>
</svg>
