<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340">
<stop offset="0%" stop-color="#0D1117"/>
<stop offset="100%" stop-color="#161B22"/>
</linearGradient>

<linearGradient id="blue" x1="0" y1="0" x2="1280" y2="0">
<stop offset="0%" stop-color="#58A6FF"/>
<stop offset="100%" stop-color="#1F6FEB"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<!-- Background -->

<rect width="1280" height="340" rx="28" fill="url(#bg)"/>

<!-- Decorative Grid -->

